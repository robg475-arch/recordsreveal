<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#1c1c1c" rx="8"/>
  
  <!-- Bold "R" letter with data bar accent -->
  <g>
    <!-- Main R shape in cream -->
    <path d="M 16 14 L 16 50 L 24 50 L 24 36 L 32 36 C 38 36 42 32 42 26 C 42 20 38 14 32 14 Z M 24 20 L 32 20 C 34 20 36 22 36 26 C 36 30 34 30 32 30 L 24 30 Z" fill="#f8f6f1"/>
    
    <!-- R leg extension (red accent) -->
    <path d="M 32 36 L 42 50 L 48 50 L 36 34 Z" fill="#b5271f"/>
    
    <!-- Data visualization bars in bottom right -->
    <rect x="38" y="42" width="4" height="8" fill="#d2691e" rx="1"/>
    <rect x="44" y="38" width="4" height="12" fill="#d2691e" rx="1"/>
    <rect x="50" y="35" width="4" height="15" fill="#d2691e" rx="1"/>
  </g>
  
  <!-- Subtle corner accent (magnifying glass symbol) -->
  <circle cx="52" cy="18" r="6" fill="none" stroke="#d2691e" stroke-width="2"/>
  <line x1="56" y1="22" x2="59" y2="25" stroke="#d2691e" stroke-width="2" stroke-linecap="round"/>
</svg>
