<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Test</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box;}
:root {
  --ink: #1c1c1c;
  --red: #b5271f;
  --cream: #f0ece3;
  --border: #ddd9ce;
  --border2: #c8c3b5;
  --paper: #f8f6f1;
}
body {
  background: var(--paper);
  font-family: Arial, sans-serif;
}
.container {
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 40px;
  background: lightblue; /* debug color */
}
.layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 48px;
  padding: 40px 0;
  background: lightgreen; /* debug color */
}
main {
  background: lightyellow; /* debug color */
  padding: 20px;
  min-height: 400px;
}
.sidebar {
  background: lightcoral; /* debug color */
  padding: 20px;
}
@media(max-width:900px) {
  .layout {
    grid-template-columns: 1fr;
  }
  .sidebar {
    display: none;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="layout">
    <main>
      <h1>Main Content</h1>
      <p>This is the main content area. It should be on the left.</p>
    </main>
    
    <aside class="sidebar">
      <h2>Sidebar</h2>
      <p>This is the sidebar. It should be on the right.</p>
      <p>If you can't see this, there's a CSS problem.</p>
    </aside>
  </div>
</div>

</body>
</html>
